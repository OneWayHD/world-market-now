<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>World Market Now</title>
  <link rel="stylesheet" href="style.css" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-annotation@1.1.0"></script>
</head>
<body>
  <header>
    <h1>World Market Now</h1>
    <div class="currency-tabs">
      <button class="currency-btn active" data-currency="USD">USD</button>
      <button class="currency-btn" data-currency="JPY">JPY</button>
      <button class="currency-btn" data-currency="EUR">EUR</button>
    </div>
  </header>

  <main id="chart-container">
    <!-- チャートがここに動的に挿入される -->
  </main>

  <footer>
    <p>&copy; 2025 World Market Now</p>
  </footer>

  <script src="data.js"></script>
  <script src="main.js"></script>
</body>
</html>
