<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>World Market Now</title>
  <link rel="stylesheet" href="style.css" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
  <header>
    <h1>World Market Now</h1>
    <div id="currency-tabs">
      <button data-currency="USD" class="tab active">USD</button>
      <button data-currency="JPY" class="tab">JPY</button>
      <button data-currency="EUR" class="tab">EUR</button>
    </div>
  </header>

  <main id="chart-container">
    <!-- JSでここにチャートが挿入される -->
  </main>

  <footer>
    <p>Updated every hour · Powered by Chart.js & Open APIs</p>
  </footer>

  <script src="data.js"></script>
  <script src="main.js"></script>
</body>
</html>
